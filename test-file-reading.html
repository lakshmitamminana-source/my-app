<!DOCTYPE html>
<html>
<head>
  <title>File Reading Test</title>
  <style>
    body { font-family: monospace; margin: 20px; }
    .test { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
    .pass { background: #90EE90; }
    .fail { background: #FFB6C6; }
    textarea { width: 100%; height: 150px; }
  </style>
</head>
<body>
  <h1>File Reading Test</h1>
  <p>Select files to test FileReader behavior:</p>
  
  <input type="file" id="fileInput" multiple accept=".txt,.csv,.pdf,.xls,.xlsx" />
  
  <div id="results"></div>

  <script>
    const resultsDiv = document.getElementById('results');
    
    document.getElementById('fileInput').addEventListener('change', async (e) => {
      resultsDiv.innerHTML = '';
      const files = Array.from(e.target.files);
      
      for (const file of files) {
        const testDiv = document.createElement('div');
        testDiv.className = 'test';
        
        try {
          const text = await readFileAsText(file);
          testDiv.innerHTML = `
            <h3>${file.name}</h3>
            <p><strong>Type:</strong> ${typeof text}</p>
            <p><strong>Length:</strong> ${text.length} characters</p>
            <p><strong>Preview:</strong></p>
            <textarea readonly>${text.substring(0, 500)}</textarea>
            <p class="pass">✓ SUCCESS</p>
          `;
          testDiv.classList.add('pass');
        } catch (err) {
          testDiv.innerHTML = `
            <h3>${file.name}</h3>
            <p><strong>Error:</strong> ${err.message}</p>
            <p class="fail">✗ FAILED</p>
          `;
          testDiv.classList.add('fail');
        }
        
        resultsDiv.appendChild(testDiv);
      }
    });
    
    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          let text = reader.result;
          console.log(`Result type for ${file.name}:`, typeof text);
          
          if (typeof text !== 'string') {
            text = text ? String(text) : '';
          }
          
          if (!text || text.trim() === '') {
            reject(new Error('File is empty or could not be read'));
            return;
          }
          
          if (text.includes('[object Object]')) {
            reject(new Error('Result contains [object Object]'));
            return;
          }
          
          resolve(text);
        };
        reader.onerror = () => reject(new Error(reader.error));
        reader.readAsText(file);
      });
    }
  </script>
</body>
</html>
